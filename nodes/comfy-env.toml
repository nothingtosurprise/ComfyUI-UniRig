[workspace]
channels = ["conda-forge", "pozzettiandrea"]


[dependencies]
c-compiler = "*"
av = "*"
ffmpeg = "*"
igl = "*"
bpy = {version = "*", channel = "pozzettiandrea"}

[target.linux-64.dependencies]
mesalib = "*"        # replaces apt: libgl1-mesa-glx
libglu = "*"         # replaces apt: libglu1-mesa
xorg-libsm = "*"     # libSM.so.6 required by bpy
cuda-cccl = "*"

[target.win-64.dependencies]
cuda-cccl = "*"

[cuda]
packages = ["torch-scatter", "torch-cluster", "flash-attn", "cumm", "spconv"]

[pypi-dependencies]
# Blender
trimesh = { version = "*", extras = ["easy"] }
psutil = "*"
comfy-aimdo = "*"
comfy-sparse-attn = "==0.0.8"
transformers = "==4.51.3"
pytorch-lightning = "*"
timm = "*"
einops = "*"
addict = "*"
omegaconf = "*"
huggingface_hub = "*"
wandb = "*"
hf_xet = "*"
fast-simplification = "*"
pyrender = "*"
pccm = "*"
shapely = "*"

[target.linux-64.pypi-dependencies]
triton = ">=3.0.0"
embreex = "*"

[target.win-64.pypi-dependencies]
triton-windows = "*"
embreex = "*"
python = "3.11"  # Required by bpy 4.2

[dependencies]
c-compiler = "*"     # needed by triton JIT

[target.linux-64.dependencies]
mesalib = "*"        # replaces apt: libgl1-mesa-glx
libglu = "*"         # replaces apt: libglu1-mesa

[cuda]
packages = ["torch-scatter", "torch-cluster", "flash-attn", "cumm", "spconv"]

[pypi-dependencies]
# Blender
bpy = ">=4.2,<4.3"
numpy = "<2.0"
trimesh = { version = "*", extras = ["easy"] }
psutil = "*"
comfy-aimdo = "*"
comfy-sparse-attn = "==0.0.8"
transformers = "==4.51.3"
pytorch_lightning = "*"
lightning = "*"
timm = "*"
einops = "*"
addict = "*"
omegaconf = "*"
huggingface_hub = "*"
wandb = "*"
hf_xet = "*"
fast-simplification = "*"
pyrender = "*"
libigl = "*"
pccm = "*"
shapely = "*"

[target.linux-64.pypi-dependencies]
triton = ">=3.0.0"
embreex = "*"

[target.win-64.pypi-dependencies]
triton-windows = "*"
embreex = "*"